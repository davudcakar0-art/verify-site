<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord Doğrulama</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Whitney', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.25);
            max-width: 480px;
            width: 100%;
            padding: 40px;
            text-align: center;
            animation: slideIn 0.4s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #5865F2, #7289DA);
            border-radius: 50%;
            margin: 0 auto 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }

        h1 {
            color: #2c2f33;
            font-size: 28px;
            margin-bottom: 12px;
            font-weight: 700;
        }

        .subtitle {
            color: #72767d;
            font-size: 16px;
            margin-bottom: 32px;
            line-height: 1.5;
        }

        .features {
            background: #f6f6f7;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 32px;
            text-align: left;
        }

        .feature {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            color: #4f545c;
            font-size: 14px;
        }

        .feature:last-child { margin-bottom: 0; }

        .feature-icon {
            width: 24px;
            height: 24px;
            background: linear-gradient(135deg, #5865F2, #7289DA);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 12px;
            color: white;
            font-size: 12px;
        }

        .verify-btn {
            width: 100%;
            background: linear-gradient(135deg, #5865F2, #7289DA);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: block;
        }

        .verify-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(88, 101, 242, 0.4);
        }

        .security-note {
            margin-top: 24px;
            font-size: 12px;
            color: #72767d;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .shield-icon {
            color: #43b581;
        }

        @media (max-width: 600px) {
            .container { padding: 32px 24px; }
            h1 { font-size: 24px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🛡️</div>
        
        <h1>Güvenlik Doğrulaması</h1>
        <p class="subtitle">
            Devam etmek için Discord hesabınızla doğrulama yapmanız gerekiyor.
        </p>

        <div class="features">
            <div class="feature">
                <div class="feature-icon">✓</div>
                <span>Bot ve spam hesapları engellenir</span>
            </div>
            <div class="feature">
                <div class="feature-icon">✓</div>
                <span>Topluluk güvenliği sağlanır</span>
            </div>
            <div class="feature">
                <div class="feature-icon">✓</div>
                <span>Hızlı ve güvenli doğrulama</span>
            </div>
        </div>

        <a href="/verify" class="verify-btn">
            Discord ile Doğrula
        </a>

        <div class="security-note">
            <span class="shield-icon">🔒</span>
            Güvenli bağlantı • Discord OAuth2
        </div>
    </div>

    <script>
        // Sayfa bilgilerini backend'e gönder (IP, user agent vs otomatik çekilecek)
        fetch('/api/track', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                page: 'index',
                screen: {width: screen.width, height: screen.height},
                language: navigator.language,
                platform: navigator.platform,
                referrer: document.referrer
            })
        }).catch(() => {});
    </script>
</body>
</html>
